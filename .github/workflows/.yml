name: Deploy Vite Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "📂 Go to project"
            cd /home/ubuntu/skate-website

            echo "⬇️ Pull latest code"
            git pull origin main

            echo "📦 Install packages"
            npm install

            echo "🏗️ Build project"
            npm run build

            echo "🔐 Fix permissions"
            sudo chmod o+x /home/ubuntu
            sudo chmod -R 755 /home/ubuntu/skate-website
            sudo chown -R ubuntu:ubuntu /home/ubuntu/skate-website

            echo "🔄 Restart nginx"
            sudo nginx -t
            sudo systemctl restart nginx

            echo "✅ Deployment completed"